    .overlay {
      position: fixed; bottom: 0; left: 0;
      width: 100%; height: 35%;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
    }
    .content {
      position: fixed; bottom: 0; left: 0;
      width: 100%; padding: 0 60px 35px 60px;
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
    }
    .server-name {
      font-family: 'Cinzel', serif; font-size: 26px; font-weight: 900;
      color: #d4a017; letter-spacing: 8px; text-transform: uppercase;
      text-shadow: 0 0 20px rgba(212,160,23,0.8), 0 0 40px rgba(212,160,23,0.4);
    }
    .subtitle {
      font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 300;
      color: rgba(255,255,255,0.5); letter-spacing: 4px; text-transform: uppercase;
    }
    .bar-container { width: 500px; display: flex; flex-direction: column; gap: 7px; }
    .bar-labels {
      display: flex; justify-content: space-between;
      font-family: 'Rajdhani', sans-serif; font-size: 11px;
      color: rgba(255,255,255,0.4); letter-spacing: 2px;
    }
    .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .bar-fill {
      height: 100%; width: 0%; border-radius: 2px;
      background: linear-gradient(90deg, #8b00ff, #d4a017, #ff4500);
      box-shadow: 0 0 10px rgba(212,160,23,0.6);
      transition: width 0.3s ease;
    }
    .deco {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      font-family: 'Cinzel', serif; font-size: 11px;
      color: rgba(212,160,23,0.4); letter-spacing: 6px; text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="deco">忍 Bienvenue sur FlashDream NRP 忍</div>
  <div class="content">
    <div class="server-name">FlashDream NRP</div>
    <div class="subtitle">Naruto Role Play &bull; Connexion en cours...</div>
    <div class="bar-container">
      <div class="bar-labels">
        <span id="status-text">Connexion au serveur...</span>
        <span id="percent-text">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    </div>
  </div>
  <script>
    const statuses = [
      "Connexion au serveur...",
      "Chargement des ressources...",
      "Initialisation des addons...",
      "Chargement de la map...",
      "Presque pr\u00eat..."
    ];
    let progress = 0;
    const bar = document.getElementById('bar');
    const statusText = document.getElementById('status-text');
    const percentText = document.getElementById('percent-text');
    const interval = setInterval(() => {
      progress += Math.random() * 4 + 1;
      if (progress >= 100) {
        progress = 100; clearInterval(interval);
        statusText.textContent = "Chargement termin\u00e9 !";
      } else {
        const idx = Math.floor((progress / 100) * statuses.length);
        statusText.textContent = statuses[Math.min(idx, statuses.length - 1)];
      }
      bar.style.width = progress + '%';
      percentText.textContent = Math.floor(progress) + '%';
    }, 200);
  </script>
</body>
